<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#6D28D9"/>
  <!-- Glow -->
  <rect width="512" height="512" rx="115" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cat paw print (centered, white) -->
  <!-- Top toe pads -->
  <ellipse cx="175" cy="175" rx="48" ry="42" fill="white" opacity="0.95"/>
  <ellipse cx="256" cy="148" rx="48" ry="42" fill="white" opacity="0.95"/>
  <ellipse cx="337" cy="175" rx="48" ry="42" fill="white" opacity="0.95"/>

  <!-- Side toe pads -->
  <ellipse cx="135" cy="258" rx="42" ry="48" fill="white" opacity="0.95"/>
  <ellipse cx="377" cy="258" rx="42" ry="48" fill="white" opacity="0.95"/>

  <!-- Main central pad -->
  <ellipse cx="256" cy="335" rx="108" ry="90" fill="white" opacity="0.95"/>

  <!-- Subtle heart shape hint in main pad -->
  <ellipse cx="230" cy="320" rx="38" ry="32" fill="#EDE9FE" opacity="0.5"/>
  <ellipse cx="282" cy="320" rx="38" ry="32" fill="#EDE9FE" opacity="0.5"/>
